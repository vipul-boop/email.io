<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050d1a;--surface:#0a1628;--card:#0f1f38;--border:#1a3356;
  --accent:#00d4ff;--accent2:#ff6b35;--accent3:#00ff88;
  --text:#e8f4ff;--muted:#6b8caa;--gold:#f0c040;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.55}

nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;justify-content:space-between;align-items:center;padding:0 3rem;height:64px;background:rgba(5,13,26,0.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.nav-brand{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.12em;color:var(--accent)}
.nav-links{display:flex;gap:2rem;list-style:none}
.nav-links a{color:var(--muted);font-size:0.78rem;letter-spacing:0.12em;text-transform:uppercase;text-decoration:none;transition:color 0.2s;cursor:pointer}
.nav-links a:hover{color:var(--accent)}

.hero{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:6rem 3rem 3rem;text-align:center}
.hero-inner{max-width:900px}
.hero-badge{display:inline-flex;align-items:center;gap:0.5rem;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.25);border-radius:100px;padding:0.4rem 1.2rem;font-size:0.72rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:1.8rem;animation:fadeDown 0.8s ease both}
.badge-dot{width:6px;height:6px;background:var(--accent3);border-radius:50%;animation:pulse 2s infinite}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,9vw,7rem);line-height:0.95;letter-spacing:0.04em;color:#fff;margin-bottom:0.5rem;animation:fadeUp 0.9s 0.1s ease both}
.hero h1 span{color:var(--accent)}
.hero-role{font-size:clamp(0.9rem,2vw,1.1rem);color:var(--muted);letter-spacing:0.2em;text-transform:uppercase;margin-bottom:2rem;animation:fadeUp 0.9s 0.2s ease both}
.hero-stats{display:flex;justify-content:center;gap:2.5rem;flex-wrap:wrap;margin-bottom:2.5rem;animation:fadeUp 0.9s 0.35s ease both}
.stat{text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2.8rem;color:var(--accent);line-height:1}
.stat-label{font-size:0.72rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-top:0.2rem}
.hero-cta{display:inline-flex;align-items:center;gap:0.6rem;background:var(--accent);color:#050d1a;padding:0.8rem 2rem;border-radius:4px;font-weight:600;font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;transition:all 0.2s;animation:fadeUp 0.9s 0.45s ease both}
.hero-cta:hover{background:#33ddff;transform:translateY(-2px)}
.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:0.4rem;color:var(--muted);font-size:0.7rem;letter-spacing:0.15em;text-transform:uppercase;animation:fadeUp 1s 0.8s ease both}
.scroll-arrow{width:20px;height:30px;border:1.5px solid var(--border);border-radius:10px;display:flex;justify-content:center;padding-top:5px}
.scroll-dot{width:3px;height:6px;background:var(--accent);border-radius:2px;animation:scrollAnim 1.5s infinite}

section{position:relative;z-index:1;padding:5rem 3rem}
.section-wrap{max-width:1100px;margin:0 auto}
.section-eyebrow{font-size:0.7rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--accent);margin-bottom:0.5rem;font-family:'DM Mono',monospace}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2.2rem,5vw,3.2rem);color:#fff;margin-bottom:3rem;letter-spacing:0.04em}
.section-title span{color:var(--accent)}

.about-strip{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:2.5rem;display:grid;grid-template-columns:1fr 1fr 1fr;gap:2rem}
.about-item{text-align:center;padding:1rem}
.about-icon{font-size:2rem;margin-bottom:0.7rem}
.about-label{font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent);margin-bottom:0.3rem;font-family:'DM Mono',monospace}
.about-val{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:0.25rem}
.about-desc{font-size:0.82rem;color:var(--muted)}

.exp-grid{display:flex;flex-direction:column;gap:1.5rem}
.exp-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:2rem;position:relative;overflow:hidden;transition:border-color 0.3s,transform 0.3s;cursor:default}
.exp-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--accent)}
.exp-card.a2::before{background:var(--accent2)}
.exp-card:not(.a2):hover{border-color:var(--accent);transform:translateX(4px)}
.exp-card.a2:hover{border-color:var(--accent2);transform:translateX(4px)}
.exp-header{display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;margin-bottom:0.3rem;flex-wrap:wrap}
.exp-title{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:0.04em;color:#fff}
.exp-period{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--accent);background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);padding:0.25rem 0.75rem;border-radius:100px;white-space:nowrap}
.exp-card.a2 .exp-period{color:var(--accent2);background:rgba(255,107,53,0.08);border-color:rgba(255,107,53,0.2)}
.exp-company{font-size:0.85rem;color:var(--muted);margin-bottom:1.2rem}
.exp-tags{display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:1.2rem}
.exp-tag{font-size:0.68rem;letter-spacing:0.1em;text-transform:uppercase;padding:0.2rem 0.6rem;border-radius:3px;background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.15);color:var(--accent)}
.exp-card.a2 .exp-tag{background:rgba(255,107,53,0.06);border-color:rgba(255,107,53,0.15);color:var(--accent2)}
.exp-bullets{list-style:none}
.exp-bullets li{font-size:0.88rem;color:#b0c8e0;line-height:1.65;padding:0.3rem 0 0.3rem 1.2rem;position:relative}
.exp-bullets li::before{content:'▸';position:absolute;left:0;color:var(--accent);font-size:0.7rem;top:0.45rem}
.exp-card.a2 .exp-bullets li::before{color:var(--accent2)}

.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-top:1.5rem}
.kpi-card{background:rgba(0,212,255,0.04);border:1px solid rgba(0,212,255,0.15);border-radius:8px;padding:1rem 1.2rem;display:flex;align-items:center;gap:0.8rem}
.kpi-card.a2{background:rgba(255,107,53,0.04);border-color:rgba(255,107,53,0.15)}
.kpi-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;color:var(--accent);line-height:1;white-space:nowrap}
.kpi-card.a2 .kpi-num{color:var(--accent2)}
.kpi-text{font-size:0.78rem;color:var(--muted);line-height:1.4}

.skills-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem}
.skill-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem}
.skill-card-title{font-size:0.75rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--accent3);margin-bottom:1rem;font-family:'DM Mono',monospace}
.skill-bars{display:flex;flex-direction:column;gap:0.75rem}
.skill-row{display:flex;flex-direction:column;gap:0.3rem}
.skill-name{font-size:0.83rem;color:var(--text);display:flex;justify-content:space-between}
.skill-name span{color:var(--muted);font-size:0.75rem}
.skill-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.skill-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent3));width:0%;transition:width 1.2s ease}
.skill-tag-cloud{display:flex;flex-wrap:wrap;gap:0.5rem}
.stag{font-size:0.75rem;padding:0.3rem 0.75rem;border-radius:100px;background:var(--surface);border:1px solid var(--border);color:var(--muted);transition:all 0.2s}
.stag:hover{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,0.05)}

.edu-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.edu-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.8rem;position:relative;overflow:hidden}
.edu-year{font-family:'DM Mono',monospace;font-size:0.7rem;color:var(--accent);letter-spacing:0.1em;margin-bottom:0.6rem}
.edu-degree{font-size:1rem;font-weight:600;color:#fff;margin-bottom:0.3rem}
.edu-school{font-size:0.82rem;color:var(--muted)}
.edu-icon{font-size:1.8rem;margin-bottom:0.8rem}
.cert-list{display:flex;flex-wrap:wrap;gap:0.6rem;margin-top:1.5rem}
.cert-chip{display:flex;align-items:center;gap:0.4rem;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:0.5rem 1rem;font-size:0.78rem;color:var(--text)}
.cert-chip::before{content:'✦';color:var(--gold);font-size:0.6rem}

.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
.contact-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;display:flex;align-items:center;gap:1rem;text-decoration:none;transition:all 0.2s}
.contact-card:hover{border-color:var(--accent);transform:translateY(-3px)}
.contact-icon-box{width:48px;height:48px;border-radius:10px;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.contact-label{font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:0.2rem}
.contact-val{font-size:0.9rem;color:#fff;font-weight:500}

footer{position:relative;z-index:1;text-align:center;padding:2rem;font-size:0.75rem;color:var(--muted);border-top:1px solid var(--border);letter-spacing:0.08em}

/* REVEAL — pop up on scroll, pop out on hover */
.reveal{opacity:0;transform:translateY(40px) scale(0.97);transition:opacity 0.65s cubic-bezier(0.22,1,0.36,1),transform 0.65s cubic-bezier(0.22,1,0.36,1)}
.reveal.visible{opacity:1;transform:translateY(0) scale(1)}
.reveal.visible:hover{transform:translateY(-6px) scale(1.018);transition:transform 0.25s cubic-bezier(0.22,1,0.36,1);z-index:2;position:relative}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
@keyframes scrollAnim{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(12px)}}

@media(max-width:768px){
  nav{padding:0 1.2rem}.nav-links{gap:1rem}.nav-links li:nth-child(n+4){display:none}
  .hero{padding:5rem 1.5rem 3rem}section{padding:3.5rem 1.5rem}
  .about-strip,.edu-grid,.contact-grid{grid-template-columns:1fr}
  .hero-stats{gap:1.5rem}
}
</style>
</head>
<body>

<script>
/* ── LIVE YEARS ── */
function liveYears(){
  return Math.floor((new Date() - CONFIG.expStartDate) / (1000*60*60*24*365.25));
}

/* ── BUILD PAGE FROM CONFIG ── */
(function(){
  const years = liveYears();

  document.getElementById('nav-brand').textContent = CONFIG.initials;
  document.title = CONFIG.name + ' — ' + CONFIG.role;

  document.getElementById('hero-badge').textContent = CONFIG.badge;
  const parts = CONFIG.name.trim().split(' ');
  document.getElementById('hero-name').innerHTML =
    parts.slice(0,-1).join(' ') + '<br/><span>' + parts[parts.length-1] + '</span>';
  document.getElementById('hero-role').textContent = CONFIG.role;
  document.getElementById('hero-cta').href = 'mailto:' + CONFIG.email;

  /* Hero stats */
  const statsEl = document.getElementById('hero-stats');
  CONFIG.heroStats.forEach(s => {
    const val = (s.num === null) ? years : s.num;
    const isLive = s.num === null;
    statsEl.innerHTML +=
      '<div class="stat">' +
        '<div class="stat-num"' + (isLive ? '' : ' data-target="'+s.num+'" data-suffix="'+s.suffix+'"') + '>' +
          val + s.suffix +
        '</div>' +
        '<div class="stat-label">' + s.label + '</div>' +
      '</div>';
  });

  /* About summary */
  document.getElementById('about-summary').innerHTML =
    CONFIG.aboutSummary.replace('{YEARS}', years);

  /* About cards */
  const acEl = document.getElementById('about-cards');
  CONFIG.aboutCards.forEach(c => {
    acEl.innerHTML +=
      '<div class="about-item">' +
        '<div class="about-icon">' + c.icon + '</div>' +
        '<div class="about-label">' + c.label + '</div>' +
        '<div class="about-val">' + c.val + '</div>' +
        '<div class="about-desc">' + c.desc + '</div>' +
      '</div>';
  });

  /* Experience */
  const expEl = document.getElementById('exp-grid');
  CONFIG.experience.forEach((job, idx) => {
    const a2 = idx > 0 ? ' a2' : '';
    expEl.innerHTML +=
      '<div class="exp-card reveal' + a2 + '">' +
        '<div class="exp-header">' +
          '<div class="exp-title">' + job.title + '</div>' +
          '<div class="exp-period">' + job.period + '</div>' +
        '</div>' +
        '<div class="exp-company">' + job.company + '</div>' +
        '<div class="exp-tags">' + job.tags.map(t => '<span class="exp-tag">'+t+'</span>').join('') + '</div>' +
        '<ul class="exp-bullets">' + job.bullets.map(b => '<li>'+b+'</li>').join('') + '</ul>' +
        '<div class="kpi-grid">' +
          job.kpis.map(k =>
            '<div class="kpi-card'+a2+'">' +
              '<div class="kpi-num">'+k.num+'</div>' +
              '<div class="kpi-text">'+k.text.replace('\n','<br/>')+'</div>' +
            '</div>'
          ).join('') +
        '</div>' +
      '</div>';
  });

  /* Skills — grouped by card title */
  const skillsEl = document.getElementById('skills-grid');
  const cardMap = {};
  CONFIG.skillBars.forEach(s => {
    if(!cardMap[s.card]) cardMap[s.card] = [];
    cardMap[s.card].push(s);
  });
  Object.entries(cardMap).forEach(([title, bars]) => {
    skillsEl.innerHTML +=
      '<div class="skill-card reveal">' +
        '<div class="skill-card-title">' + title + '</div>' +
        '<div class="skill-bars">' +
          bars.map(b =>
            '<div class="skill-row">' +
              '<div class="skill-name">' + b.name + '<span>' + b.level + '</span></div>' +
              '<div class="skill-track"><div class="skill-fill" data-w="'+b.pct+'"></div></div>' +
            '</div>'
          ).join('') +
        '</div>' +
      '</div>';
  });
  skillsEl.innerHTML +=
    '<div class="skill-card reveal">' +
      '<div class="skill-card-title">Methodologies & Knowledge</div>' +
      '<div class="skill-tag-cloud">' +
        CONFIG.skillTags.map(t => '<span class="stag">'+t+'</span>').join('') +
      '</div>' +
    '</div>';

  /* Education */
  const eduEl = document.getElementById('edu-grid');
  CONFIG.education.forEach(e => {
    eduEl.innerHTML +=
      '<div class="edu-card">' +
        '<div class="edu-icon">' + e.icon + '</div>' +
        '<div class="edu-year">' + e.years + '</div>' +
        '<div class="edu-degree">' + e.degree + '</div>' +
        '<div class="edu-school" style="color:'+e.color+';margin:0.3rem 0 0.2rem;font-weight:500">' + e.major + '</div>' +
        '<div class="edu-school">' + e.school + '</div>' +
      '</div>';
  });

  /* Certs */
  const certEl = document.getElementById('cert-list');
  CONFIG.certifications.forEach(c => {
    certEl.innerHTML += '<div class="cert-chip">' + c + '</div>';
  });
  document.getElementById('lang-line').textContent = 'Languages: ' + CONFIG.languages;

  /* Contact */
  const contactItems = [
    { icon:'✉',  label:'Email',    val: CONFIG.email,         href:'mailto:'+CONFIG.email,                      ext:false },
    { icon:'📞', label:'Phone',    val: CONFIG.phone,         href:'tel:'+CONFIG.phone.replace(/\s/g,''),       ext:false },
    { icon:'in', label:'LinkedIn', val: CONFIG.linkedinLabel, href: CONFIG.linkedin,                            ext:true,  li:true },
    { icon:'📍', label:'Location', val: CONFIG.location,      href:'#',                                         ext:false },
  ];
  const contactEl = document.getElementById('contact-grid');
  contactItems.forEach(c => {
    const iStyle = c.li ? 'font-size:1rem;font-weight:700;color:var(--accent)' : '';
    contactEl.innerHTML +=
      '<a class="contact-card" href="'+c.href+'"'+(c.ext?' target="_blank"':'')+'>'+
        '<div class="contact-icon-box" style="'+iStyle+'">'+c.icon+'</div>'+
        '<div>'+
          '<div class="contact-label">'+c.label+'</div>'+
          '<div class="contact-val">'+c.val+'</div>'+
        '</div>'+
      '</a>';
  });

  /* Footer */
  document.getElementById('footer').innerHTML =
    '&copy; ' + new Date().getFullYear() + ' ' + CONFIG.name +
    ' &nbsp;·&nbsp; ' + CONFIG.role + ' &nbsp;·&nbsp; Mumbai, India';
})();

/* ── NAV SCROLL ── */
function navTo(id){
  const el = document.getElementById(id);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
}

/* ── ANIMATED BG ── */
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W,H,nodes=[],edges=[],packets=[];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
function initNodes(){nodes=[];const c=Math.min(60,Math.floor(W*H/18000));for(let i=0;i<c;i++)nodes.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,r:Math.random()*2+1.5,type:Math.random()<0.2?'hub':'node'});}
function buildEdges(){edges=[];for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){const dx=nodes[i].x-nodes[j].x,dy=nodes[i].y-nodes[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<160)edges.push({a:i,b:j,d});}}
function spawnPacket(){if(!edges.length)return;const e=edges[Math.floor(Math.random()*edges.length)];packets.push({edge:e,t:0,speed:0.004+Math.random()*0.006,color:Math.random()<0.5?'#00d4ff':'#00ff88'});}
let frame=0;
function draw(){
  ctx.clearRect(0,0,W,H);
  for(const n of nodes){n.x+=n.vx;n.y+=n.vy;if(n.x<0||n.x>W)n.vx*=-1;if(n.y<0||n.y>H)n.vy*=-1;}
  if(frame%60===0)buildEdges();
  if(frame%30===0&&packets.length<25)spawnPacket();
  for(const e of edges){const a=nodes[e.a],b=nodes[e.b],al=Math.max(0,1-e.d/160)*0.18;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(0,180,220,${al})`;ctx.lineWidth=0.6;ctx.stroke();}
  packets=packets.filter(p=>p.t<=1);
  for(const p of packets){p.t+=p.speed;const a=nodes[p.edge.a],b=nodes[p.edge.b],x=a.x+(b.x-a.x)*p.t,y=a.y+(b.y-a.y)*p.t;ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fillStyle=p.color;ctx.shadowBlur=8;ctx.shadowColor=p.color;ctx.fill();ctx.shadowBlur=0;}
  for(const n of nodes){ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);if(n.type==='hub'){ctx.fillStyle='rgba(0,212,255,0.6)';ctx.shadowBlur=10;ctx.shadowColor='#00d4ff';}else{ctx.fillStyle='rgba(0,180,220,0.25)';ctx.shadowBlur=0;}ctx.fill();ctx.shadowBlur=0;}
  frame++;requestAnimationFrame(draw);
}
resize();initNodes();buildEdges();draw();
window.addEventListener('resize',()=>{resize();initNodes();});

/* ── COUNTER ANIMATION ── */
function animateCounter(el, target, suffix){
  let cur=0; const step=target/60;
  const t=setInterval(()=>{cur=Math.min(cur+step,target);el.textContent=Math.round(cur)+suffix;if(cur>=target)clearInterval(t);},16);
}
let counted=false;
function checkCounters(){
  if(counted)return;
  const counters=document.querySelectorAll('[data-target]');
  if(!counters.length)return;
  if(counters[0].getBoundingClientRect().top<window.innerHeight){
    counted=true;
    counters.forEach(el=>animateCounter(el,+el.dataset.target,el.dataset.suffix||''));
  }
}

/* ── REVEAL ON SCROLL ── */
const observer=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      e.target.classList.add('visible');
      e.target.querySelectorAll('.skill-fill').forEach(bar=>{bar.style.width=bar.dataset.w+'%';});
    }
  });
},{threshold:0.12});
/* observe after DOM built */
setTimeout(()=>{document.querySelectorAll('.reveal').forEach(r=>observer.observe(r));},50);
window.addEventListener('scroll',checkCounters);
checkCounters();
</script>
